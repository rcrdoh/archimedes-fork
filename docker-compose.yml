# Archimedes — Docker Compose for production deployment on EC2
# Usage: docker compose up --build -d

services:
  # ---------- Data stores (LOCAL ONLY — see profiles note) ----------
  # postgres + redis run ONLY when the `localdb` profile is active
  # (COMPOSE_PROFILES=localdb, set in .env.example for local dev). In PRODUCTION
  # the .env omits COMPOSE_PROFILES, so these two services are NOT started and
  # the app talks to managed Aurora + ElastiCache via DATABASE_URL / REDIS_URL.
  # This makes ONE compose file serve both: `docker compose up` locally brings up
  # the full self-contained stack; the same command in prod (no localdb profile)
  # runs the app tier against managed stores. See docs/deployment.md.
  postgres:
    image: postgres:16-alpine
    profiles: ["localdb"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archimedes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env — no default for security}
      POSTGRES_DB: ${POSTGRES_DB:-archimedes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # NO host port binding — Postgres is only reachable by other containers
    # on the Docker bridge network. Never expose DB ports to the host/internet.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archimedes}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["localdb"]
    restart: unless-stopped
    # NO host port binding — Redis is internal-only.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Reverse proxy + Frontend ----------
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        # VITE_* vars embed into the JS bundle at build time (Vite reads
        # them during `npm run build`). Sourced from the host .env file;
        # empty defaults so the build still succeeds when unconfigured.
        VITE_CIRCLE_CLIENT_KEY: ${VITE_CIRCLE_CLIENT_KEY:-}
        VITE_CIRCLE_CLIENT_URL: ${VITE_CIRCLE_CLIENT_URL:-https://modular-sdk.circle.com/v1/rpc/w3s/buidl}
        VITE_API_BASE: ${VITE_API_BASE:-}
    restart: unless-stopped
    ports:
      # TLS terminates upstream at CloudFront + the ALB; nginx serves plain
      # HTTP on :8080. No :443/8443 mapping and no cert mounts — the
      # in-container self-signed-cert stopgap is retired (the ALB→nginx hop is
      # plain HTTP, so large responses no longer 502 through that TLS layer).
      - "80:8080"
    depends_on:
      backend:
        condition: service_started

  # ---------- Oracle (price feeder) ----------
  oracle:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "archimedes.chain.oracle_runner"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ORACLE_INTERVAL_SECONDS: ${ORACLE_INTERVAL_SECONDS:-60}
      ARC_VAULT_FACTORY_ADDRESS: ${ARC_VAULT_FACTORY_ADDRESS:-0xca873414070844aeb98b0bf1051f81969c79cc32}
      ARC_REASONING_TRACE_REGISTRY_ADDRESS: ${ARC_REASONING_TRACE_REGISTRY_ADDRESS:-0x42d8a23edb897cbee203e9fa197eb05ab5106ca6}
    env_file:
      - .env
    healthcheck:
      disable: true
    # required: false → these app services still start when postgres/redis are
    # NOT in the active profile (production = managed Aurora/ElastiCache). When
    # the `localdb` profile IS active, they wait for the local DB/cache to be
    # healthy. (required on depends_on needs docker compose ≥ 2.20.)
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

  # ---------- Strategy Agent (autonomous portfolio runner) ----------
  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "archimedes.chain.agent_runner"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AGENT_INTERVAL_SECONDS: ${AGENT_INTERVAL_SECONDS:-300}
      AGENT_DRY_RUN: ${AGENT_DRY_RUN:-false}
      ARC_VAULT_FACTORY_ADDRESS: ${ARC_VAULT_FACTORY_ADDRESS:-0xca873414070844aeb98b0bf1051f81969c79cc32}
      ARC_AMM_ROUTER_ADDRESS: ${ARC_AMM_ROUTER_ADDRESS:-0xd5b829f9d364a8bbe1caf6c8b19cb05371b178f4}
      ARC_REASONING_TRACE_REGISTRY_ADDRESS: ${ARC_REASONING_TRACE_REGISTRY_ADDRESS:-0x42d8a23edb897cbee203e9fa197eb05ab5106ca6}
    env_file:
      - .env
    volumes:
      - ./analytics-engine/strategies:/app/analytics-engine/strategies:ro
      - ./contracts/abis:/contracts/abis:ro
    healthcheck:
      disable: true
    # required: false → these app services still start when postgres/redis are
    # NOT in the active profile (production = managed Aurora/ElastiCache). When
    # the `localdb` profile IS active, they wait for the local DB/cache to be
    # healthy. (required on depends_on needs docker compose ≥ 2.20.)
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

  # ---------- Backend API ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # NO host port binding — backend is only reachable via nginx reverse proxy.
    # This ensures all rate limits, CORS, security headers, and the docs gate
    # cannot be bypassed by hitting port 8000 directly.
    expose:
      - "8000"  # visible to other containers (nginx), NOT to the host
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Deployed Arc testnet contracts (override via .env if needed)
      ARC_AMM_ROUTER_ADDRESS: ${ARC_AMM_ROUTER_ADDRESS:-0xd5b829f9d364a8bbe1caf6c8b19cb05371b178f4}
      ARC_VAULT_FACTORY_ADDRESS: ${ARC_VAULT_FACTORY_ADDRESS:-0xca873414070844aeb98b0bf1051f81969c79cc32}
      ARC_REASONING_TRACE_REGISTRY_ADDRESS: ${ARC_REASONING_TRACE_REGISTRY_ADDRESS:-0x42d8a23edb897cbee203e9fa197eb05ab5106ca6}
      ARC_ASSET_REGISTRY_ADDRESS: ${ARC_ASSET_REGISTRY_ADDRESS:-0x2d44550711137916df6175587d17886281a0fbc7}
      ARCHIMEDES_STRATEGIES_DIR: /app/analytics-engine/strategies
      ARCHIMEDES_CORPUS_MANIFEST: /app/data/corpus/manifest.jsonl
      ARCHIMEDES_FUSION_ENABLED: ${ARCHIMEDES_FUSION_ENABLED:-true}
      KB_ARTIFACT_DIR: /app/data/corpus-artifact
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-}
      EMAIL_ENCRYPTION_KEY: ${EMAIL_ENCRYPTION_KEY:-}
      # Production secret loading: load_ssm_secrets() (main.py, at import time)
      # reads /archimedes/prod/* from SSM via the EC2 instance role at startup
      # and injects them into the env (e.g. EMAIL_ENCRYPTION_KEY, which prod mode
      # fail-closes on). It is a NO-OP unless AWS_SSM_PATH_PREFIX is set, and the
      # region must match where the params live (us-east-1). This keeps the
      # secret out of .env and CI. Local dev has no AWS creds → it no-ops safely.
      AWS_SSM_PATH_PREFIX: ${AWS_SSM_PATH_PREFIX:-/archimedes/prod/}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    env_file:
      - .env
    volumes:
      - ./analytics-engine/strategies:/app/analytics-engine/strategies:ro
      - ./analytics-engine/artifacts:/app/analytics-engine/artifacts:ro
      - ./contracts/abis:/contracts/abis:ro
      - ./data/corpus:/app/data/corpus:ro
      - archimedes-corpus-artifact:/app/data/corpus-artifact
    # required: false → these app services still start when postgres/redis are
    # NOT in the active profile (production = managed Aurora/ElastiCache). When
    # the `localdb` profile IS active, they wait for the local DB/cache to be
    # healthy. (required on depends_on needs docker compose ≥ 2.20.)
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

  # ---------- KB pipeline runner (Phase 3c skeleton) ----------
  # Polls the corpus + artifact volume and re-runs the SPECTER2 / HDBSCAN /
  # BERTopic / REBEL / SciSpacy pipeline when the trigger conditions hit
  # (≥KB_NEW_PAPER_THRESHOLD papers OR ≥KB_MAX_DAYS_SINCE_LAST days).
  #
  # The pipeline body itself is gated behind KB_PIPELINE_ENABLED — leave
  # unset until the dedicated image with the ~6 GB of model weights ships;
  # the runner simply logs "needs_rerun=False" between ticks meanwhile.
  # See docs/specs/kb-integration-spec.md.
  kb-runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "archimedes.services.kb_runner"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      KB_ARTIFACT_DIR: /srv/corpus-artifact
      KB_CORPUS_DIR: /srv/corpus-text
      KB_RUNNER_INTERVAL_SECONDS: ${KB_RUNNER_INTERVAL_SECONDS:-21600}
      KB_NEW_PAPER_THRESHOLD: ${KB_NEW_PAPER_THRESHOLD:-100}
      KB_MAX_DAYS_SINCE_LAST: ${KB_MAX_DAYS_SINCE_LAST:-7}
      KB_PIPELINE_ENABLED: ${KB_PIPELINE_ENABLED:-}
    env_file:
      - .env
    volumes:
      - ./data/corpus:/srv/corpus-text:ro
      - archimedes-corpus-artifact:/srv/corpus-artifact:rw
    # required: false → starts against managed Aurora in prod (no localdb profile).
    depends_on:
      postgres:
        condition: service_healthy
        required: false

volumes:
  pgdata:
  archimedes-corpus-artifact:
