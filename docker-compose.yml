# Archimedes — Docker Compose for production deployment on EC2
# Usage: docker compose up --build -d

services:
  # ---------- Data stores ----------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archimedes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archimedes-hackathon-2026}
      POSTGRES_DB: ${POSTGRES_DB:-archimedes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archimedes}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Reverse proxy + Frontend ----------
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

  # ---------- Oracle (price feeder) ----------
  oracle:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "archimedes.chain.oracle_runner"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://archimedes:archimedes-hackathon-2026@postgres:5432/archimedes}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ORACLE_INTERVAL_SECONDS: ${ORACLE_INTERVAL_SECONDS:-60}
    env_file:
      - .env
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------- Backend API ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://archimedes:archimedes-hackathon-2026@postgres:5432/archimedes}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    env_file:
      - .env
    volumes:
      - ./analytics-engine/strategies:/app/analytics-engine/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
