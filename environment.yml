name: archimedes
channels:
  - conda-forge
dependencies:
  # Core toolchain
  - python=3.12
  - pip
  - uv          # Modern, fast Python package + tool installer (used for arc-canteen and dev tooling)
  - git
  - nodejs>=22  # Frontend toolchain (npm, npx). Required for `npm run lint`,
                # `npm run dev`, `npm run build` in ui/. Without this, devs
                # have to install Node separately and CI-vs-local parity
                # breaks (the ESLint gate runs in CI only).

  # Python deps installed via pip — pinned loosely; tighten in pyproject.toml as the project firms up.
  - pip:
      # --- Web backend ---
      - fastapi>=0.115
      - "starlette>=1.0.1"            # Pinned directly to close PYSEC-2026-161 (Host-header validation bypass); FastAPI's range can resolve to vulnerable 1.0.0 without this floor.
      - "uvicorn[standard]>=0.49.0"
      - sqlalchemy>=2.0
      - psycopg2-binary>=2.9.12       # PostgreSQL driver (binary wheel; no system pq needed). Floor aligned with backend/requirements.txt via dependabot PR #247.
      - redis>=8.0.0                  # Redis client for live regime/state cache (aligned with backend/requirements.txt)
      - pydantic>=2.13.4
      - pydantic-settings>=2.14.1     # Floor aligned with backend/requirements.txt via dependabot PR #248.
      - python-dotenv>=1.2.2
      - "slowapi>=0.1.10"             # FastAPI rate-limiter — required by api/limiter.py + user_routes.py. CI installs from backend/requirements.txt; this keeps local dev parity.

      # --- Data + numerics ---
      - numpy>=2.4.6,<3.0             # numpy 2 verified against backtrader 1.9.78.123 on 2026-06-12: full analytics-engine suite (170 tests) + backend backtrader tests + e2e Faber SMA200 run all green. Aligned with backend/requirements.txt (dependabot #489).
      - pandas>=2.2
      - scipy>=1.13
      - scikit-learn>=1.5            # GaussianMixture + StandardScaler for the GmmRegimeDetector (issue #661); BSD-3-Clause. Aligned with backend/requirements.txt.
      - matplotlib>=3.8
      - seaborn>=0.13

      # --- Market data ---
      - yfinance>=1.4.1              # Historical + live equity/ETF/crypto data; for backtesting
      - requests>=2.32
      - aiohttp>=3.14.1                # Bumped from 3.13.5 to close CVE-2026-34993 / CVE-2026-47265 (HTTP parser DoS/smuggling). Floor aligned with backend/requirements.txt.
      - httpx>=0.27                   # Directly imported by services/corpus_service.py (arXiv intake) and services/llm_backend.py (OpenAI-compatible + Ollama). Pinned so we don't rely on transitive resolution.

      # --- Backtesting (per backtrader-vs-vectorbt decision memo) ---
      - backtrader>=1.9.78.123        # Decision: v1 default. See docs/specs/backtrader-vs-vectorbt-decision-memo.md. Floor aligned with backend/requirements.txt via dependabot PR #249.

      # --- LLM ---
      - anthropic>=0.104.1            # Claude / GLM-compatible client for strategy extraction + reasoning trace generation + chat. Floor aligned with backend/requirements.txt via dependabot PR #251; locally smoke-tested at 0.104.1 against llm_backend.py + chat_service.py (full 784-test backend suite green).

      # --- On-chain / Web3 ---
      # Floors kept in lockstep with backend/requirements.txt (audit 2026-06-14):
      # the two had drifted (web3 7.0 vs 7.16.0, eth-utils 5.0 vs 6.0.0), which is
      # the documented #1 cause of "works locally, breaks in CI". eth-utils 5→6
      # was an API-breaking bump, so the floors must agree.
      - web3>=7.16.0                  # Python EVM client; works with Arc (EVM-compatible)
      - eth-account>=0.13.7           # Local key management for testnet wallets
      - eth-utils>=6.0.0
      - cryptography>=42.0            # RSA sign/serialize for the oracle signer (backend/archimedes/chain/oracle_updater.py); mirrors backend/requirements.txt

      # --- AWS / S3 ---
      - boto3>=1.35                    # S3 artifact reads for KB pipeline output (embeddings, KG)

      # --- Paper ingestion (Q-fin corpus) ---
      - arxiv>=2.1                    # arxiv API client
      - pypdf>=6.13.2                 # PDF text extraction

      # --- Quality + tests ---
      - ruff>=0.6                     # Linter + formatter; configured at line length 120
      - pytest>=8.3
      - pytest-asyncio>=0.24
      - pytest-cov>=5.0
      - mypy>=1.11
      - "pip-audit>=2.7"              # Supply-chain CVE scanner — run `pip-audit` to check installed deps against the PyPI vulnerability DB. Not yet a CI gate; advisory only.

      # --- Dev convenience ---
      - ipython>=8.27
      - jupyter>=1.1                  # For exploratory strategy work
      - tornado>=6.5.6                # Pinned directly to close CVE-2026-49854 (WebSocket frame-length overflow) in jupyter's transitive tornado dep. environment.yml-only: tornado is a dev/notebook dependency, not imported by backend runtime code (not in backend/requirements.txt).
