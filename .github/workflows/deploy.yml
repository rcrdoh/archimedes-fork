# Archimedes — Deploy to EC2 via SSM (no SSH keys)
#
# Authentication: OIDC federation (GitHub → AWS IAM role assumption).
# No long-lived AWS access keys in GitHub Secrets.
#
# Secrets: PULL-MODEL — this workflow no longer carries any application secret.
#   App secrets (LLM_PROVIDER/LLM_AUTH_TOKEN/LLM_BASE_URL, EMAIL_ENCRYPTION_KEY,
#   VITE_CIRCLE_CLIENT_KEY) live in AWS SSM Parameter Store under /archimedes/prod/*
#   and are read by the EC2 instance role at runtime, never injected from CI.
#   Population runbook: infra/iam/README.md § "SSM Parameter Store — app secrets".
#
# Required GitHub Variables (or hardcoded below):
#   AWS_ROLE_ARN — arn:aws:iam::159903201072:role/archimedes-github-deploy
#   EC2_INSTANCE_ID — i-0987f70a131ed3ab1
#
# ─── KNOWN SECURITY DEBT ───
#
# 1. SECRETS IN SSM COMMAND HISTORY + CLOUDTRAIL — RESOLVED 2026-06-14 (audit #5).
#    Previously GitHub Actions interpolated ${{ secrets.X }} into the SSM command
#    body, leaking the literal values into SSM command history + CloudTrail
#    SendCommand events. Fixed by removing all CI secret injection: the backend
#    now reads LLM_*/EMAIL_ENCRYPTION_KEY from SSM Parameter Store via its EC2
#    instance role at container start (services/secrets_service.load_ssm_secrets,
#    IAM in infra/iam/archimedes-backend-policy.json). The deploy script no longer
#    touches secrets, so no secret value enters any AWS audit surface.
#
# 2. OUT-OF-BAND IAM RESOURCES NOT TERRAFORMED.
#    `archimedes-github-deploy`, `AWSSystemsManagerDefaultEC2InstanceManagementRole`,
#    and the AmazonSSMManagedInstanceCore policy attachment on the EC2 role
#    were created via AWS CLI, not Terraform. Codify in `infra/iam/`
#    follow-up so the IAM state is versioned + recoverable from declarative
#    config.
#
# 3. VERIFY OIDC TRUST POLICY IS LOCKED TO THIS REPO.
#    The role trust policy must restrict token.actions.githubusercontent.com
#    to `repo:a-apin/archimedes:*` (or tighter: `:ref:refs/heads/main`).
#    Without that condition, any GitHub repo's Actions can assume the role.
#    Verify with: aws iam get-role --role-name archimedes-github-deploy
#    and inspect AssumeRolePolicyDocument's Condition block.

name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  id-token: write   # Required for OIDC token request
  contents: read

env:
  AWS_REGION: eu-west-2
  EC2_INSTANCE_ID: i-0987f70a131ed3ab1

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35  # SSM 30min + AWS API overhead + buffer

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: arn:aws:iam::159903201072:role/archimedes-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM SendCommand
        run: |
          # Build the deploy script as a single string for SSM
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 1800 \
            --parameters commands='[
              "#!/bin/bash",
              "set -eux",
              "export HOME=/root",
              "cd /opt/archimedes",
              "git config --global --add safe.directory /opt/archimedes",
              "mkdir -p analytics-engine/artifacts",
              "sudo chown -R ubuntu:ubuntu analytics-engine/artifacts/ 2>/dev/null || true",
              "git fetch origin main",
              "git reset --hard origin/main",
              "df -h / | tail -1 | awk '"'"'{print \"DISK_BEFORE: \"$0}'"'"'",
              "docker container prune -f 2>/dev/null || true",
              "docker image prune -af 2>/dev/null || true",
              "df -h / | tail -1 | awk '"'"'{print \"DISK_AFTER_PRUNE: \"$0}'"'"'",
              "# Pull-model (audit 2026-06-13 #5): secrets are NO LONGER injected from",
              "# CI, so no secret value enters the SSM command body / CloudTrail. The",
              "# backend reads LLM_*/EMAIL_ENCRYPTION_KEY from SSM Parameter Store at",
              "# startup via its instance role (services/secrets_service.load_ssm_secrets);",
              "# the box-local, gitignored .env (untouched by git reset) carries any",
              "# values not yet in SSM, incl. the build-time VITE_CIRCLE_CLIENT_KEY. See",
              "# infra/iam/README.md for the SSM population runbook.",
              "grep -q '"'"'^PUBLIC_DOMAIN='"'"' .env || echo '"'"'PUBLIC_DOMAIN=https://archimedes-arc.app'"'"' >> .env",
              "docker compose build",
              "docker ps -aq --filter '"'"'name=^[0-9a-f]\\{12\\}_archimedes-'"'"' | xargs -r docker rm -f 2>/dev/null || true",
              "docker compose up -d --force-recreate --remove-orphans",
              "docker image prune -f",
              "docker compose exec -T backend python -m archimedes.scripts.seed_backtests_from_artifacts || echo WARN_SEED_SKIP",
              "docker compose exec -dT backend python -m archimedes.scripts.hydrate_corpus || echo WARN_HYDRATE_SKIP",
              "docker compose exec -T backend python -c '"'"'import asyncio; from archimedes.services.amm_bootstrap import bootstrap_amm_liquidity; r=asyncio.run(bootstrap_amm_liquidity()); print(dict(r))'"'"' || echo WARN_BOOTSTRAP_SKIP",
              "sleep 10",
              "docker compose exec -T backend python -c '"'"'import urllib.request; r=urllib.request.urlopen(\"http://localhost:8000/health\"); print(r.read().decode()[:80])'"'"'",
              "echo DEPLOY_COMPLETE"
            ]' \
            --region "$AWS_REGION" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Poll for completion (180 × 10s = 30 min, matches SSM --timeout-seconds 1800)
          for i in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --region "$AWS_REGION" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "✅ Deploy succeeded"
              # Print output
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --region "$AWS_REGION" \
                --query 'StandardOutputContent' \
                --output text | tail -20
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "❌ Deploy $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --region "$AWS_REGION" \
                --query '{Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
                --output json | tail -50
              exit 1
            fi

            echo "Status: $STATUS (attempt $i/60)"
            sleep 10
          done

          echo "❌ Deploy timed out waiting for SSM command"
          exit 1
