# Quality gate — runs on every PR to main.
#
# Hard block:
#   backend-tests  — pytest unit suite (no DB/Redis required)
#
# Informational table (posted as PR comment):
#   ruff linter    — ruff check + ruff format --check
#   eslint         — npm run lint
#   coverage       — unit coverage vs 60% floor (agent PRs only)

name: Quality Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-tests:
    name: Backend — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install --quiet -r backend/requirements.txt "pytest>=8.3" "pytest-asyncio>=0.24" "pytest-cov>=5.0"
      - name: Test
        run: pytest -m "not integration" --tb=short -q

  lint-report:
    name: Lint — report table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet ruff

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci --quiet

      - name: ruff
        id: ruff
        continue-on-error: true
        run: |
          ruff check backend/archimedes --output-format=json 2>/dev/null > /tmp/ruff.json || true
          ruff format --check backend/archimedes > /tmp/ruff_fmt.txt 2>&1 || true
          python3 - <<'EOF'
          import json, os, re
          try:
              errors = len(json.load(open("/tmp/ruff.json")))
          except Exception:
              errors = 0
          try:
              m = re.search(r"(\d+) file", open("/tmp/ruff_fmt.txt").read())
              errors += int(m.group(1)) if m else 0
          except Exception:
              pass
          out = open(os.environ["GITHUB_OUTPUT"], "a")
          out.write(f"result={'passed' if errors == 0 else 'not passed'}\n")
          out.write(f"errors={errors}\n")
          EOF

      - name: eslint
        id: eslint
        continue-on-error: true
        run: |
          cd ui && npm run lint > /tmp/eslint.txt 2>&1 || true
          python3 - <<'EOF'
          import os, re
          try:
              txt = open("/tmp/eslint.txt").read()
              m = re.search(r"(\d+) error", txt)
              errors = int(m.group(1)) if m else 0
              m = re.search(r"(\d+) warning", txt)
              warnings = int(m.group(1)) if m else 0
          except Exception:
              errors, warnings = 0, 0
          out = open(os.environ["GITHUB_OUTPUT"], "a")
          out.write(f"result={'passed' if errors == 0 and warnings == 0 else 'not passed'}\n")
          out.write(f"errors={errors}\n")
          out.write(f"warnings={warnings}\n")
          EOF

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fmt = r => r === 'passed' ? '✅ passed' : '❌ not passed';
            const ruff        = fmt('${{ steps.ruff.outputs.result }}');
            const ruffErrors  = '${{ steps.ruff.outputs.errors }}' || '0';
            const eslint      = fmt('${{ steps.eslint.outputs.result }}');
            const eslintErr   = '${{ steps.eslint.outputs.errors }}' || '0';
            const eslintWarn  = '${{ steps.eslint.outputs.warnings }}' || '0';

            const marker = '<!-- quality-gate-v1 -->';
            const body = [
              marker,
              '## Quality Gate',
              '',
              '| Check | Status | Errors | Warnings |',
              '|---|---|---|---|',
              `| ruff linter (python) | ${ruff} | ${ruffErrors} | — |`,
              `| eslint (frontend) | ${eslint} | ${eslintErr} | ${eslintWarn} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  coverage-gate:
    name: Backend — coverage (agent PRs only)
    if: github.event.pull_request.user.login == 't2o2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet -r backend/requirements.txt "pytest>=8.3" "pytest-asyncio>=0.24" "pytest-cov>=5.0"
      - run: pytest -m "not integration" --cov=archimedes --cov-fail-under=60 --tb=short -q
