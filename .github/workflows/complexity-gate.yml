# Complexity gate — runs on every PR to main.
#
# Per-function metrics vs. main baseline:
#   CC (cyclomatic complexity)  — lizard, cross-language
#   Nesting depth               — lizard (max nested loops/conditionals)
#   Δ CC                        — delta vs. same function on main
#   Recursive                   — Python AST only (direct self-calls)
#
# Thresholds:
#   CC  1–5   ✅ simple
#   CC  6–10  ⚠️ moderate  (flagged, no block)
#   CC 11–15  🟠 complex   (flagged, no block)
#   CC 16+    🔴 critical  → blocks merge
#   Nesting ≥ 3 ⚠️         (flagged, no block)
#
# lizard is installed via pip (cached). The GHCR image built by deploy.yml
# exists for local/manual use but is not pulled here — avoids the bootstrap
# problem where the image doesn't exist until after the first merge to main.

name: Complexity Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**.py"
      - "ui/src/**.js"
      - "ui/src/**.ts"
      - "ui/src/**.jsx"
      - "ui/src/**.tsx"

permissions:
  pull-requests: write

jobs:
  complexity:
    name: Complexity analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Main baseline — separate directory so the script can diff without git
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: .baseline

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/docker/complexity-gate/Dockerfile

      - name: Install lizard
        run: pip install --quiet lizard

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.js' '*.ts' '*.jsx' '*.tsx' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "count=$(echo $FILES | wc -w)" >> $GITHUB_OUTPUT

      - name: Run complexity analysis
        id: analysis
        if: steps.changed.outputs.count > 0
        run: |
          python .github/scripts/complexity_analysis.py \
            --changed-files ${{ steps.changed.outputs.files }} \
            --baseline-dir .baseline \
            --output-json /tmp/complexity_result.json \
            > /tmp/complexity_comment.md
        continue-on-error: true

      - name: Post or update PR comment
        if: steps.changed.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body, result;
            try {
              body = fs.readFileSync('/tmp/complexity_comment.md', 'utf8');
              result = JSON.parse(fs.readFileSync('/tmp/complexity_result.json', 'utf8'));
            } catch {
              body = '## 🔬 Complexity Analysis\n\n⚠️ Analysis script failed — check the Actions log.';
              result = { has_critical: false };
            }

            const marker = '<!-- complexity-gate-v1 -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

            if (result.has_critical) {
              core.setFailed('Critical complexity detected (CC ≥ 16). Reduce function complexity before merging.');
            }
