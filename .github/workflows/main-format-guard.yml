# Main format guard — runs on every push to main.
#
# Background: quality-gate.yml only fires on pull_request, so direct-to-main
# pushes (which we explicitly allow for the agentic system) bypass the ruff
# format check. Unformatted files on main strand every open PR's ruff-gate.
#
# This workflow:
#   1. Runs `ruff format --check` on push to main — surfaces the violation
#      in CI history so the team (and the agent) sees what landed unformatted.
#   2. If unformatted: runs `ruff format`, commits the fix back with
#      `[skip ci]` in the message so we don't recurse.
#
# Net effect: main self-heals; open PRs never get blocked by drift; the
# auto-format commit acts as a visible nudge for the contributor (or agent)
# to start running ruff locally.

name: Main Format Guard

on:
  push:
    branches: [main]

permissions:
  contents: write  # needed for the self-heal push

jobs:
  format-guard:
    name: Ruff format — check + self-heal
    runs-on: ubuntu-latest
    # Don't recurse on our own auto-format commit.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v7
        with:
          # Need a real token to push back. The default GITHUB_TOKEN can
          # push to the same repo when permissions: contents: write is set.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install --quiet ruff

      - name: ruff format --check (surface the violation)
        id: check
        continue-on-error: true
        run: ruff format --check .

      - name: ruff format (self-heal)
        if: steps.check.outcome == 'failure'
        run: ruff format .

      - name: Commit + push the auto-format
        if: steps.check.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[infra] auto-format main with ruff format [skip ci]

          Triggered by ${{ github.sha }} which landed unformatted Python.
          Run by main-format-guard.yml.

          Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push origin main

      - name: Fail the run so the violation is visible
        if: steps.check.outcome == 'failure'
        run: |
          echo "::warning::main landed unformatted Python. Auto-formatted in a follow-up commit."
          echo "::warning::Contributors: please run 'pre-commit install' or 'ruff format .' before pushing."
          exit 1
